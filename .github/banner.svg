<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FinOps — יועץ פיננסי אישי, מקומי לחלוטין">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12352B"/>
      <stop offset="0.55" stop-color="#1F6F5C"/>
      <stop offset="1" stop-color="#175140"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EAF2EF"/>
      <stop offset="1" stop-color="#BFE0D6"/>
    </linearGradient>
    <style>
      .title { font: 700 76px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #FBFAF7; letter-spacing: -1px; }
      .sub   { font: 400 27px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #CFE6DE; }
      .seal  { font: 600 20px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #EAF2EF; }
      .chip  { font: 500 19px "Segoe UI", system-ui, -apple-system, sans-serif; fill: #DCEEE8; }
    </style>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="360" rx="0" fill="url(#bg)"/>
  <!-- subtle hairline ledger rows -->
  <g opacity="0.10" stroke="#FBFAF7" stroke-width="1">
    <line x1="0" y1="90"  x2="1280" y2="90"/>
    <line x1="0" y1="180" x2="1280" y2="180"/>
    <line x1="0" y1="270" x2="1280" y2="270"/>
  </g>

  <!-- mark: a small bar chart in a rounded tile -->
  <g transform="translate(96,116)">
    <rect x="0" y="0" width="128" height="128" rx="30" fill="#0E2A22" opacity="0.55"/>
    <rect x="0" y="0" width="128" height="128" rx="30" fill="none" stroke="#EAF2EF" stroke-opacity="0.25" stroke-width="1.5"/>
    <g transform="translate(30,34)">
      <rect x="0"  y="40" width="16" height="28" rx="4" fill="url(#bar)"/>
      <rect x="26" y="20" width="16" height="48" rx="4" fill="url(#bar)"/>
      <rect x="52" y="4"  width="16" height="64" rx="4" fill="url(#bar)"/>
      <path d="M4 42 L34 22 L60 8" fill="none" stroke="#FBFAF7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- wordmark + tagline -->
  <text x="264" y="168" class="title">FinOps</text>
  <text x="266" y="212" class="sub">יועץ פיננסי אישי + דשבורד חי — מקומי לחלוטין</text>

  <!-- trust chips -->
  <g transform="translate(266,246)">
    <g>
      <rect x="0" y="0" width="176" height="40" rx="20" fill="#0E2A22" opacity="0.5"/>
      <text x="88" y="27" text-anchor="middle" class="chip">🔒 מקומי בלבד</text>
    </g>
    <g transform="translate(190,0)">
      <rect x="0" y="0" width="150" height="40" rx="20" fill="#0E2A22" opacity="0.5"/>
      <text x="75" y="27" text-anchor="middle" class="chip">👁️ קריאה בלבד</text>
    </g>
    <g transform="translate(356,0)">
      <rect x="0" y="0" width="196" height="40" rx="20" fill="#0E2A22" opacity="0.5"/>
      <text x="98" y="27" text-anchor="middle" class="chip">☁️ בלי ענן</text>
    </g>
  </g>

  <!-- corner seal -->
  <g transform="translate(1120,52)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#EAF2EF" stroke-opacity="0.35" stroke-width="1.5"/>
    <path d="M-12 0 L-4 9 L13 -10" fill="none" stroke="#EAF2EF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
